name: Build Synkey-Nevi APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout private source (secure clone via PAT)
        run: |
          git clone --depth 1 \
            "https://x-access-token:${{ secrets.MY_PAT_TOKEN }}@github.com/montage8/synkey_nevi.git" \
            source

      - name: Set up JDK 17 (required by AGP 8.1.4)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        working-directory: source
        run: chmod +x ./gradlew

      - name: Build Debug APK (TLS 문제 회피 옵션 적용)
        working-directory: source
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dhttps.protocols=TLSv1.2,TLSv1.3 \
            -Dorg.gradle.internal.http.connectionTimeout=120000 \
            -Dorg.gradle.internal.http.socketTimeout=120000

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: synkey-nevi-debug-apk
          path: source/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7
